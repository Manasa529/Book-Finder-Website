<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: #fff;
      text-align: center;
      backdrop-filter: brightness(0.6);
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
      text-shadow: 2px 2px 4px black;
    }

    .search-box {
      margin: 20px auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    input {
      width: 220px;
    }

    select {
      width: 150px;
    }

    button {
      background-color: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #ffaa00;
    }

    #book-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 25px;
    }

    .book {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      width: 200px;
      margin: 10px;
      padding: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      text-align: center;
    }

    .book img {
      width: 100%;
      height: 250px;
      border-radius: 5px;
    }

    .book h3 {
      font-size: 16px;
      margin-top: 10px;
    }

    .book p {
      font-size: 14px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>📖 Book Finder</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Enter book name...">
    
    <select id="languageSelect">
      <option value="">All Languages</option>
      <option value="eng">English</option>
      <option value="fre">French</option>
      <option value="spa">Spanish</option>
      <option value="ger">German</option>
      <option value="hin">Hindi</option>
    </select>

    <select id="sortSelect">
      <option value="relevance">Relevance</option>
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
    </select>

    <button onclick="searchBook()">Search</button>
  </div>

  <div id="book-list"></div>

  <script>
    function searchBook() {
      const query = document.getElementById('searchInput').value.trim();
      const language = document.getElementById('languageSelect').value;
      const sort = document.getElementById('sortSelect').value;
      const list = document.getElementById('book-list');
      list.innerHTML = ''; 

      if (query === '') {
        alert('Please enter a book name!');
        return;
      }

      let url = `https://openlibrary.org/search.json?q=${query}`;
      if (language) url += `&language=${language}`;
      console.log("API Request URL:", url);

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.docs.length === 0) {
            list.innerHTML = '<h3>No books found!</h3>';
            return;
          }

          let books = data.docs.slice(0, 20);

          // Sorting logic
          if (sort === 'newest') {
            books.sort((a, b) => (b.first_publish_year || 0) - (a.first_publish_year || 0));
          } else if (sort === 'oldest') {
            books.sort((a, b) => (a.first_publish_year || 0) - (b.first_publish_year || 0));
          }

          // Display books
          books.forEach(book => {
            const title = book.title || 'No Title';
            const author = book.author_name ? book.author_name[0] : 'Unknown Author';
            const year = book.first_publish_year || 'Unknown Year';
            const coverId = book.cover_i;
            const imgSrc = coverId 
              ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` 
              : 'https://via.placeholder.com/200x250?text=No+Image';

            const div = document.createElement('div');
            div.classList.add('book');
            div.innerHTML = `
              <img src="${imgSrc}" alt="${title}">
              <h3>${title}</h3>
              <p><b>Author:</b> ${author}</p>
              <p><b>Year:</b> ${year}</p>
            `;
            list.appendChild(div);
          });
        })
        .catch(error => {
          console.error('Error:', error);
          list.innerHTML = '<h3>Error fetching data. Please try again later.</h3>';
        });
    }
  </script>
</body>
</html>
